<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Trenčín Quest</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- INTRO -->
  <div id="screen-intro" class="screen active">
    <div class="intro-wave"></div>
    <div class="intro-wave2"></div>
    <div class="intro-content">
      <div class="intro-logo">🏰</div>
      <h1 class="title-main">Trenčín Quest</h1>
      <p class="title-sub">Mestská šifrovacia hra</p>
      <div class="intro-card">
        <p class="intro-card-title">Vyber svoj tím</p>
        <button class="btn-team" onclick="startGame(1)">
          <div class="team-icon-wrap">⚔️</div>
          <div class="team-info">
            <div class="team-name">TÍM 1</div>
            <div class="team-route">Hotel → Stĺp → Vodník → Synagóga → Hrad</div>
          </div>
          <span class="team-arrow">›</span>
        </button>
        <button class="btn-team" onclick="startGame(2)">
          <div class="team-icon-wrap">🛡️</div>
          <div class="team-info">
            <div class="team-name">TÍM 2</div>
            <div class="team-route">Synagóga → Vodník → Stĺp → Hotel → Hrad</div>
          </div>
          <span class="team-arrow">›</span>
        </button>
      </div>
    </div>
  </div>

  <!-- GAME -->
  <div id="screen-game" class="screen">
    <header class="game-header">
      <div class="header-left">
        <button class="btn-back" id="btn-back" onclick="goBack()">‹ Späť</button>
      </div>
      <div class="header-center" id="header-team-label">TÍM 1</div>
      <div class="header-right" id="stop-counter">1 / 5</div>
    </header>
    <div class="progress-bar-wrap">
      <div class="progress-track">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-stops" id="progress-stops"></div>
    </div>
    <main class="game-main" id="game-main"></main>
  </div>

  <!-- FINISH -->
  <div id="screen-finish" class="screen">
    <div class="finish-content">
      <div class="trophy-wrap">🏆</div>
      <h2 class="finish-title">Gratulujem!</h2>
      <p class="finish-text">Prešli ste celý maršrut<br/>a rozlúštili všetky záhady Trenčína.</p>
      <p class="finish-team" id="finish-team-label"></p>
      <button class="btn-restart" onclick="restartGame()">Hrať znova</button>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
